<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Product Details - Trace</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
    <!-- iOS PWA Support -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="/icons/icon.png">
    <style>
        body { padding-bottom: calc(85px + env(safe-area-inset-bottom, 16px)); }
        
        /* Mobile-First Header Overrides */
        @media (min-width: 768px) {
            body { padding-bottom: 2rem; }
        }

        /* Swiper / Gallery Layout */
        .product-gallery { position: relative; width: 100%; }
        .swiper-container {
            display: flex;
            overflow-x: auto;
            scroll-snap-type: x mandatory;
            scroll-behavior: smooth;
            scrollbar-width: none; /* Firefox */
            -ms-overflow-style: none;  /* IE/Edge */
            border-radius: var(--radius-lg);
            background: #f3f4f6;
            box-shadow: var(--shadow-sm);
        }
        .swiper-container::-webkit-scrollbar { display: none; /* Chrome/Safari */ }
        .swiper-slide {
            flex: 0 0 100%;
            width: 100%;
            scroll-snap-align: start;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 350px;
            overflow: hidden;
            position: relative;
        }
        .swiper-slide img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            padding: 1.5rem;
            transition: transform 0.3s ease;
        }
        .swiper-slide img:hover {
            transform: scale(1.03);
        }
        .slider-dots {
            position: absolute;
            bottom: 15px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            justify-content: center;
            gap: 0.5rem;
            z-index: 10;
            background: rgba(255, 255, 255, 0.5);
            backdrop-filter: blur(4px);
            padding: 6px 10px;
            border-radius: var(--radius-full);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: var(--shadow-sm);
        }
        .slider-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: rgba(0, 0, 0, 0.2);
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .slider-dot.active {
            background: var(--primary);
            transform: scale(1.1);
            width: 14px;
            border-radius: 4px;
        }
        
        /* Floating Back button (Mobile Only) */
        .back-btn {
            position: absolute;
            top: 1rem;
            left: 1rem;
            width: 40px;
            height: 40px;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(8px);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: var(--shadow-md);
            z-index: 10;
            cursor: pointer;
            border: 1px solid rgba(255, 255, 255, 0.3);
            transition: transform 0.2s;
        }
        .back-btn:active {
            transform: scale(0.9);
        }
        @media (min-width: 768px) {
            .back-btn { display: none; }
        }

        /* Product Details Sheet */
        .details-sheet {
            background: var(--white);
            border-radius: 24px 24px 0 0;
            margin-top: -20px;
            position: relative;
            padding: 2rem 1.5rem;
            box-shadow: 0 -10px 20px rgba(0, 0, 0, 0.02);
        }
        
        /* Desktop Dual Column Grid */
        @media (min-width: 768px) {
            .product-layout-grid {
                display: grid;
                grid-template-columns: 1fr 1fr;
                gap: 3rem;
                margin-top: 2rem;
            }
            .details-sheet {
                margin-top: 0;
                padding: 0;
                border-radius: 0;
                box-shadow: none;
            }
            .swiper-slide {
                height: 480px;
            }
        }

        .spec-item { display: flex; justify-content: space-between; padding: 0.85rem 0; border-bottom: 1px solid var(--border-color); font-size: 0.95rem; }
        .spec-item .key { color: var(--text-muted); font-weight: 500; }
        .spec-item .val { color: var(--text-main); font-weight: 600; text-align: right; max-width: 60%; }

        .buy-price { font-size: 1.75rem; font-weight: 800; color: var(--primary-dark); }

        /* Premium Related Grid on Desktop, Scroll on Mobile */
        .related-products-section {
            margin-top: 4rem;
            border-top: 1px solid var(--border-color);
            padding-top: 2.5rem;
            margin-bottom: 2rem;
        }
        .related-grid {
            display: flex;
            gap: 1rem;
            overflow-x: auto;
            padding: 0.5rem 0 1.5rem;
            scroll-snap-type: x mandatory;
        }
        .related-grid::-webkit-scrollbar { display: none; }
        @media (min-width: 768px) {
            .related-grid {
                display: grid;
                grid-template-columns: repeat(4, 1fr);
                gap: 1.5rem;
                overflow-x: visible;
                padding: 1rem 0;
            }
        }

        .premium-card {
            background: var(--white);
            border-radius: var(--radius-lg);
            overflow: hidden;
            box-shadow: var(--shadow-sm);
            border: 1px solid rgba(0,0,0,0.04);
            transition: transform 0.2s, box-shadow 0.2s;
            display: flex;
            flex-direction: column;
            width: 150px;
            flex-shrink: 0;
            scroll-snap-align: start;
        }
        @media (min-width: 768px) {
            .premium-card {
                width: auto;
            }
            .premium-card:hover {
                transform: translateY(-4px);
                box-shadow: var(--shadow-md);
            }
        }
    </style>
</head>
<body>
    <div class="loader" id="loader" style="margin-top: 5rem;"></div>

    <!-- Desktop Header -->
    <header>
        <div class="container nav-container">
            <a href="/" class="logo">Trace</a>
            <nav class="nav-links">
                <a href="/products.html">All Products</a>
            </nav>
            <div class="account-wrapper" id="desktopAccount">
                <a href="/profile.html" class="account-icon" id="desktopProfileLink" style="text-decoration:none; color:inherit;">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
                </a>
            </div>
        </div>
    </header>
    
    <div id="productContent" class="container" style="display: none;">
        <div class="product-layout-grid">
            <!-- Left Side: Image Gallery -->
            <div class="product-gallery">
                <div class="back-btn" onclick="history.back()">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
                </div>
                <div class="swiper-container" id="swiperContainer">
                    <!-- Dynamic images populated here -->
                </div>
                <div class="slider-dots" id="sliderDots">
                    <!-- Dynamic dots populated here -->
                </div>
            </div>
            
            <!-- Right Side: Details Form -->
            <div class="details-sheet">
                <div style="text-transform: uppercase; letter-spacing: 0.05em; color: var(--primary); font-weight: 700; font-size: 0.8rem; margin-bottom: 0.5rem;" id="prodBrand"></div>
                <h1 id="prodTitle" style="font-size: 1.75rem; margin-bottom: 0.75rem; line-height: 1.25;"></h1>
                
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.75rem;">
                    <div class="buy-price" id="prodPrice">UGX 0</div>
                    <button id="wishlistBtn" class="btn btn-outline" style="width: 44px; height: 44px; padding: 0; display: flex; align-items: center; justify-content: center; border-radius: 50%;">
                        <svg id="wishlistIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path></svg>
                    </button>
                </div>

                <div class="form-group" style="margin-bottom: 1.25rem;">
                    <label>Condition</label>
                    <select id="conditionSelect" class="form-control" style="font-weight: 600; font-size: 1rem;"></select>
                </div>

                <div id="variationsContainer" style="margin-bottom: 1.5rem;"></div>

                <p id="prodDesc" style="font-size: 1rem; color: var(--text-muted); line-height: 1.6; margin-bottom: 2rem;"></p>
                
                <h3 style="font-size: 1.1rem; margin-bottom: 1rem;">Specifications</h3>
                <div id="specsList" style="margin-bottom: 2rem;"></div>
                
                <div style="margin-top: 2.5rem;" id="orderActionContainer">
                    <button class="btn btn-primary" id="orderNowBtn" style="width: 100%; padding: 1.1rem; font-size: 1.1rem;">Order Now</button>
                    <div id="orderStatusMsg" style="display: none; text-align: center; margin-top: 1rem; padding: 1rem; background: var(--primary-light); color: var(--primary-dark); border-radius: var(--radius-md);"></div>
                </div>
            </div>
        </div>

        <!-- You Might Also Like Section -->
        <div class="related-products-section">
            <h3 style="font-size: 1.35rem; margin-bottom: 1.25rem; font-weight: 800;">You might also like</h3>
            <div class="related-grid" id="relatedScroll"></div>
        </div>
    </div>

    <!-- Mobile Bottom Navigation -->
    <nav class="bottom-nav">
        <a href="/" class="bottom-nav-item">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
            Home
        </a>
        <a href="/products.html" class="bottom-nav-item">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="9" cy="21" r="1"></circle><circle cx="20" cy="21" r="1"></circle><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path></svg>
            Shop
        </a>
        <a href="/profile.html" class="bottom-nav-item" id="mobileProfileBtn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
            Profile
        </a>
    </nav>

    <script src="/js/api.js?v=2"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const params = new URLSearchParams(window.location.search);
            const id = params.get('id');
            if(!id) return window.location.href = '/products.html';

            const user = JSON.parse(localStorage.getItem('user'));
            if (!user) {
                document.getElementById('mobileProfileBtn').href = '/login.html';
                document.getElementById('desktopProfileLink').href = '/login.html';
            }

            const loader = document.getElementById('loader');
            const content = document.getElementById('productContent');
            loader.style.display = 'block';

            let productPrices = {};
            let productVariations = {};

            try {
                const data = await api.products.getById(id);
                const p = data.product;
                
                document.title = `${p.name} - Trace`;
                document.getElementById('prodBrand').textContent = p.brand;
                document.getElementById('prodTitle').textContent = p.name;
                document.getElementById('prodDesc').textContent = p.description;

                // Pricing & Condition logic
                productPrices = {
                    'new': p.price_new,
                    'refurbished': p.price_refurbished,
                    'used': p.price_used
                };

                const condSelect = document.getElementById('conditionSelect');
                let firstAvailable = null;
                if (p.price_new) { condSelect.innerHTML += `<option value="new">Brand New - ${formatPrice(p.price_new)}</option>`; firstAvailable = firstAvailable || 'new'; }
                if (p.price_refurbished) { condSelect.innerHTML += `<option value="refurbished">Refurbished - ${formatPrice(p.price_refurbished)}</option>`; firstAvailable = firstAvailable || 'refurbished'; }
                if (p.price_used) { condSelect.innerHTML += `<option value="used">Used - ${formatPrice(p.price_used)}</option>`; firstAvailable = firstAvailable || 'used'; }

                const updatePriceDisplay = () => {
                    const selCond = condSelect.value;
                    document.getElementById('prodPrice').textContent = formatPrice(productPrices[selCond]);
                };
                condSelect.addEventListener('change', updatePriceDisplay);
                if (firstAvailable) {
                    condSelect.value = firstAvailable;
                    updatePriceDisplay();
                } else {
                    document.getElementById('prodPrice').textContent = 'N/A';
                    document.getElementById('orderNowBtn').disabled = true;
                }

                // Variations
                productVariations = p.variations || {};
                const varCont = document.getElementById('variationsContainer');
                Object.entries(productVariations).forEach(([key, values]) => {
                    if (Array.isArray(values) && values.length > 0) {
                        const selHTML = values.map(v => `<option value="${v}">${v}</option>`).join('');
                        varCont.innerHTML += `
                            <div class="form-group" style="margin-bottom: 1rem;">
                                <label>${key}</label>
                                <select class="form-control var-select" data-key="${key}" style="padding: 0.5rem;">
                                    ${selHTML}
                                </select>
                            </div>
                        `;
                    }
                });
                
                // Image Gallery with dots
                const swiperContainer = document.getElementById('swiperContainer');
                const dotsContainer = document.getElementById('sliderDots');
                const imagesList = p.images && p.images.length > 0 ? p.images : ['https://via.placeholder.com/600?text=No+Image'];
                
                imagesList.forEach((imgUrl, idx) => {
                    swiperContainer.innerHTML += `
                        <div class="swiper-slide">
                            <img src="${imgUrl}" alt="${p.name}">
                        </div>
                    `;
                    
                    dotsContainer.innerHTML += `
                        <div class="slider-dot ${idx === 0 ? 'active' : ''}" onclick="scrollToSlide(${idx})"></div>
                    `;
                });

                // Sync dots on scroll
                swiperContainer.addEventListener('scroll', () => {
                    const width = swiperContainer.offsetWidth;
                    const index = Math.round(swiperContainer.scrollLeft / width);
                    const dots = document.querySelectorAll('.slider-dot');
                    dots.forEach((dot, idx) => {
                        dot.classList.toggle('active', idx === index);
                    });
                });

                // Function to scroll slide on dot click
                window.scrollToSlide = function(idx) {
                    const width = swiperContainer.offsetWidth;
                    swiperContainer.scrollTo({
                        left: idx * width,
                        behavior: 'smooth'
                    });
                };

                // Specs
                const specsList = document.getElementById('specsList');
                if (p.specs && Object.keys(p.specs).length > 0) {
                    for (const [key, value] of Object.entries(p.specs)) {
                        specsList.innerHTML += `<div class="spec-item"><span class="key">${key.toUpperCase()}</span><span class="val">${value}</span></div>`;
                    }
                }

                // Related Products
                const related = document.getElementById('relatedScroll');
                data.related.forEach(rp => {
                    const rImg = rp.images && rp.images.length > 0 ? rp.images[0] : 'https://via.placeholder.com/300';
                    const rPrice = rp.price_new || rp.price_refurbished || rp.price_used || 0;
                    related.innerHTML += `
                        <a href="/product.html?id=${rp.id}" class="premium-card">
                            <div class="product-image-wrap" style="height: 120px; padding: 0.5rem; background: #f8f9fa;">
                                <img src="${rImg}">
                            </div>
                            <div class="product-info" style="padding: 0.75rem;">
                                <div class="brand-text">${rp.brand}</div>
                                <div class="product-title" style="font-size:0.85rem; height: 2.4rem; -webkit-line-clamp: 2;">${rp.name}</div>
                                <div class="product-price" style="font-size:0.95rem; margin-top: 0.25rem;">${formatPrice(rPrice)}</div>
                            </div>
                        </a>
                    `;
                });

                // Initial wishlist check
                if (user) {
                    checkWishlistStatus(id);
                }

                document.getElementById('wishlistBtn').onclick = async () => {
                    if (!user) {
                        window.location.href = '/login.html';
                        return;
                    }
                    try {
                        const res = await api.wishlist.toggle(id);
                        updateWishlistUI(res.status === 'added');
                    } catch(e) {
                        console.error('Wishlist error:', e);
                    }
                };

                // Order Flow
                const orderBtn = document.getElementById('orderNowBtn');
                const statusMsg = document.getElementById('orderStatusMsg');
                let orderPollInterval;

                const checkOrderStatus = async (orderId) => {
                    try {
                        const myOrders = await api.orders.getMyOrders();
                        const order = myOrders.find(o => o.id === orderId);
                        if (order && order.status === 'accepted') {
                            clearInterval(orderPollInterval);
                            statusMsg.innerHTML = `
                                <strong>Order Accepted!</strong><br>
                                Vendor: ${order.vendor_name}<br>
                                Contact: <a href="tel:${order.vendor_contact}" style="color: var(--primary); font-weight: bold;">${order.vendor_contact}</a><br>
                                <span style="font-size:0.8rem; color:var(--text-muted);">Please call them to arrange delivery/pickup.</span>
                            `;
                            statusMsg.style.background = '#dff9fb';
                            statusMsg.style.color = '#130f40';
                        }
                    } catch(e) { console.error(e); }
                };

                orderBtn.onclick = () => {
                    if (!user) {
                        window.location.href = '/login.html';
                        return;
                    }

                    orderBtn.disabled = true;
                    orderBtn.textContent = 'Getting location...';

                    if (!navigator.geolocation) {
                        alert('Geolocation is not supported by your browser.');
                        orderBtn.disabled = false;
                        orderBtn.textContent = 'Order Now';
                        return;
                    }

                    navigator.geolocation.getCurrentPosition(
                        async (pos) => {
                            try {
                                orderBtn.textContent = 'Submitting Request...';
                                
                                // Collect selected variations
                                const selectedVars = {};
                                document.querySelectorAll('.var-select').forEach(sel => {
                                    selectedVars[sel.dataset.key] = sel.value;
                                });

                                const res = await api.orders.create({
                                    product_id: id,
                                    latitude: pos.coords.latitude,
                                    longitude: pos.coords.longitude,
                                    condition_type: condSelect.value,
                                    variations: selectedVars
                                });
                                
                                orderBtn.style.display = 'none';
                                statusMsg.style.display = 'block';
                                statusMsg.innerHTML = `
                                    <div style="margin-bottom: 0.5rem;"><span style="display: inline-block; width: 20px; height: 20px; border: 3px solid var(--primary); border-top-color: transparent; border-radius: 50%; animation: spin 1s linear infinite;"></span></div>
                                    <strong>Request Sent!</strong><br>
                                    Searching for nearby vendors with stock...
                                    <style>@keyframes spin { to { transform: rotate(360deg); } }</style>
                                `;

                                // Start polling order status
                                orderPollInterval = setInterval(() => checkOrderStatus(res.order_id), 3000);
                            } catch (err) {
                                alert(err.message);
                                orderBtn.style.display = 'block';
                                orderBtn.disabled = false;
                                orderBtn.textContent = 'Order Now';
                            }
                        },
                        (err) => {
                            alert('We need your location to find nearby vendors.');
                            orderBtn.disabled = false;
                            orderBtn.textContent = 'Order Now';
                        }
                    );
                };

                loader.style.display = 'none';
                content.style.display = 'block';
            } catch (err) {
                loader.style.display = 'none';
                alert('Failed to load product.');
            }
        });

        async function checkWishlistStatus(id) {
            try {
                const wishlist = await api.wishlist.getAll();
                const isInWishlist = wishlist.some(item => item.id == id);
                updateWishlistUI(isInWishlist);
            } catch(e) {}
        }

        function updateWishlistUI(isInWishlist) {
            const icon = document.getElementById('wishlistIcon');
            const btn = document.getElementById('wishlistBtn');
            if (isInWishlist) {
                icon.setAttribute('fill', 'var(--primary)');
                icon.setAttribute('stroke', 'var(--primary)');
                btn.style.borderColor = 'var(--primary)';
            } else {
                icon.setAttribute('fill', 'none');
                icon.setAttribute('stroke', 'currentColor');
                btn.style.borderColor = 'var(--border-color)';
            }
        }
    </script>
</body>
</html>
