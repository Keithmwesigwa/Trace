<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login / Register - Trace</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
    <style>
        .tabs { display: flex; border-bottom: 2px solid var(--border-color); margin-bottom: 2rem; }
        .tab-btn { flex: 1; padding: 1rem; text-align: center; cursor: pointer; font-weight: 600; color: var(--text-muted); background: none; border: none; font-size: 1rem; }
        .tab-btn.active { color: var(--primary); border-bottom: 2px solid var(--primary); margin-bottom: -2px; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
    </style>
</head>
<body style="background: var(--bg-color);">
    <div class="container">
        <div style="text-align: center; margin-top: 3rem;">
            <a href="/" class="logo" style="justify-content: center;">
                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path><polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline><line x1="12" y1="22.08" x2="12" y2="12"></line></svg>
                Trace
            </a>
        </div>
        
        <div class="auth-container">
            <div class="tabs">
                <button class="tab-btn active" onclick="switchTab('login')">Login</button>
                <button class="tab-btn" onclick="switchTab('register')">Register</button>
            </div>

            <!-- Login Form -->
            <form id="loginForm" class="tab-content active">
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" class="form-control" name="email" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" class="form-control" name="password" required>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%;">Sign In</button>
                <p id="loginErr" style="color: red; margin-top: 1rem; text-align: center; display: none;"></p>
            </form>

            <!-- Register Form -->
            <form id="registerForm" class="tab-content">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" class="form-control" name="name" required>
                </div>
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" class="form-control" name="email" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" class="form-control" name="password" required>
                </div>
                <div class="form-group">
                    <label>Contact Number</label>
                    <input type="text" class="form-control" name="contact" placeholder="+256..." required>
                </div>
                <div class="form-group">
                    <label>Account Type</label>
                    <select class="form-control" name="role" id="roleSelect">
                        <option value="user">Customer</option>
                        <option value="vendor">Vendor Shop</option>
                    </select>
                </div>
                <input type="hidden" name="latitude" id="regLat">
                <input type="hidden" name="longitude" id="regLng">
                <button type="submit" class="btn btn-primary" id="regBtn" style="width: 100%;">Create Account</button>
                <p id="regErr" style="color: red; margin-top: 1rem; text-align: center; display: none;"></p>
            </form>
        </div>
    </div>

    <script src="/js/api.js"></script>
    <script>
        function switchTab(tab) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelector(`.tab-btn[onclick="switchTab('${tab}')"]`).classList.add('active');
            document.getElementById(`${tab}Form`).classList.add('active');
        }

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const data = Object.fromEntries(new FormData(e.target));
            try {
                const res = await api.auth.login(data);
                localStorage.setItem('token', res.token);
                localStorage.setItem('user', JSON.stringify(res.user));
                const role = res.user.role;
                window.location.href = role === 'admin' ? '/admin/index.html' : role === 'vendor' ? '/vendor/index.html' : '/';
            } catch (err) {
                const errEl = document.getElementById('loginErr');
                errEl.textContent = err.message;
                errEl.style.display = 'block';
            }
        });

        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('regBtn');
            const role = document.getElementById('roleSelect').value;
            const errEl = document.getElementById('regErr');
            errEl.style.display = 'none';
            btn.disabled = true;

            const submitForm = async (lat = null, lng = null) => {
                const data = Object.fromEntries(new FormData(e.target));
                if (lat) data.latitude = lat;
                if (lng) data.longitude = lng;
                try {
                    const res = await api.auth.register(data);
                    localStorage.setItem('token', res.token);
                    localStorage.setItem('user', JSON.stringify(res.user));
                    window.location.href = res.user.role === 'vendor' ? '/vendor/index.html' : '/';
                } catch (err) {
                    errEl.textContent = err.message;
                    errEl.style.display = 'block';
                    btn.disabled = false;
                    btn.textContent = 'Create Account';
                }
            };

            if (role === 'vendor') {
                btn.textContent = 'Getting Location...';
                if (!navigator.geolocation) {
                    errEl.textContent = 'Geolocation is not supported by your browser.';
                    errEl.style.display = 'block';
                    btn.disabled = false;
                    btn.textContent = 'Create Account';
                    return;
                }
                navigator.geolocation.getCurrentPosition(
                    (pos) => submitForm(pos.coords.latitude, pos.coords.longitude),
                    (err) => {
                        errEl.textContent = 'We need your location to list your shop.';
                        errEl.style.display = 'block';
                        btn.disabled = false;
                        btn.textContent = 'Create Account';
                    }
                );
            } else {
                submitForm();
            }
        });
    </script>
</body>
</html>
