<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Trace</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
    <style>
        .admin-layout { display: grid; grid-template-columns: 240px 1fr; min-height: 100vh; }
        .sidebar { background: var(--white); border-right: 1px solid var(--border-color); padding: 2rem; }
        .content { padding: 2rem; background: var(--bg-color); }
        .nav-item { display: block; padding: 0.75rem 1rem; color: var(--text-muted); font-weight: 500; border-radius: var(--radius-md); margin-bottom: 0.5rem; transition: background 0.2s; }
        .nav-item:hover, .nav-item.active { background: var(--primary-light); color: var(--primary-dark); }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); align-items: center; justify-content: center; z-index: 100; }
        .modal.active { display: flex; }
        .modal-content { background: var(--white); padding: 2rem; border-radius: var(--radius-lg); width: 100%; max-width: 800px; max-height: 90vh; overflow-y: auto; }
        .specs-editor, .variations-editor { display: grid; grid-template-columns: 1fr 1fr auto; gap: 0.5rem; margin-bottom: 0.5rem; }
        .action-flex { display: flex; gap: 0.5rem; }
        .image-preview-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(80px, 1fr)); gap: 0.5rem; margin-top: 1rem; }
        .image-preview-item { position: relative; height: 80px; border-radius: var(--radius-md); overflow: hidden; border: 1px solid var(--border-color); }
        .image-preview-item img { width: 100%; height: 100%; object-fit: cover; }
        .image-preview-item .remove-img { position: absolute; top: 2px; right: 2px; background: rgba(255,0,0,0.8); color: white; border: none; border-radius: 50%; width: 20px; height: 20px; font-size: 12px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>
    <div class="admin-layout">
        <aside class="sidebar">
            <a href="/" class="logo" style="margin-bottom: 3rem;">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path></svg>
                Shop Admin
            </a>
            <nav>
                <a href="#products" class="nav-item active" onclick="switchAdminTab('products')">Products</a>
                <a href="#feedback" class="nav-item" onclick="switchAdminTab('feedback')">Feedback</a>
                <a href="#" onclick="logout(); return false;" class="nav-item">Logout</a>
            </nav>
        </aside>

        <main class="content">
            <div id="productsPanel">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
                    <h1>Products Manager</h1>
                    <button class="btn btn-primary" onclick="openModal()">+ Add Product</button>
                </div>

                <table class="admin-table">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Name</th>
                            <th>Category</th>
                            <th>Prices (N / R / U)</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="productsTableBody">
                        <!-- Populated via JS -->
                    </tbody>
                </table>
            </div>

            <div id="feedbackPanel" style="display: none;">
                <h1 style="margin-bottom: 2rem;">User Feedback</h1>
                <div id="feedbackContainer">
                    <!-- Populated via JS -->
                </div>
            </div>
        </main>
    </div>

    <!-- Add/Edit Product Modal -->
    <div class="modal" id="productModal">
        <div class="modal-content">
            <h2 id="modalTitle" style="margin-bottom: 1.5rem;">Add Product</h2>
            <form id="productForm">
                <input type="hidden" id="productId">
                <div class="form-group">
                    <label>Name</label>
                    <input type="text" class="form-control" id="pName" required>
                </div>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                    <div class="form-group">
                        <label>Brand</label>
                        <input type="text" class="form-control" id="pBrand" required>
                    </div>
                    <div class="form-group">
                        <label>Category</label>
                        <select class="form-control" id="pCategory" required></select>
                    </div>
                </div>
                
                <h4 style="margin: 1.5rem 0 0.5rem 0;">Pricing</h4>
                <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 1rem; margin-bottom: 1rem;">
                    <div class="form-group">
                        <label>Brand New Price</label>
                        <input type="number" step="0.01" class="form-control" id="pPriceNew">
                    </div>
                    <div class="form-group">
                        <label>Refurbished Price</label>
                        <input type="number" step="0.01" class="form-control" id="pPriceRefurbished">
                    </div>
                    <div class="form-group">
                        <label>Used Price</label>
                        <input type="number" step="0.01" class="form-control" id="pPriceUsed">
                    </div>
                </div>

                <div class="form-group">
                    <label>Description</label>
                    <textarea class="form-control" id="pDesc" rows="3" required></textarea>
                </div>
                
                <div class="form-group">
                    <label>Product Images (Max 9)</label>
                    <input type="file" id="pImageInput" accept="image/*" multiple class="form-control" style="padding-bottom: 2rem;">
                    <div id="imagePreviewGrid" class="image-preview-grid"></div>
                </div>

                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 2rem; margin-top: 1rem;">
                    <div class="form-group">
                        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.5rem;">
                            <label style="margin-bottom: 0;">Specifications</label>
                            <button type="button" class="btn btn-outline" style="padding: 0.2rem 0.6rem; font-size: 0.75rem;" onclick="loadPresets()">Load Presets</button>
                        </div>
                        <div id="specsContainer"></div>
                        <button type="button" class="btn btn-outline" style="width: 100%; margin-top: 0.5rem; font-size: 0.85rem;" onclick="addSpecRow()">+ Add Spec</button>
                    </div>

                    <div class="form-group">
                        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.5rem;">
                            <label style="margin-bottom: 0;">Custom Variations</label>
                        </div>
                        <p style="font-size: 0.75rem; color: var(--text-muted); margin-top: -0.25rem; margin-bottom: 0.5rem;">Values must be comma separated (e.g. Red, Blue)</p>
                        <div id="variationsContainer"></div>
                        <button type="button" class="btn btn-outline" style="width: 100%; margin-top: 0.5rem; font-size: 0.85rem;" onclick="addVariationRow()">+ Add Variation</button>
                    </div>
                </div>

                <div style="display: flex; justify-content: flex-end; gap: 1rem; margin-top: 2rem;">
                    <button type="button" class="btn btn-outline" onclick="closeModal()">Cancel</button>
                    <button type="submit" class="btn btn-primary" id="saveBtn">Save Product</button>
                </div>
            </form>
        </div>
    </div>

    <script src="/js/api.js?v=2"></script>
    <script>
        // Check Admin
        const user = JSON.parse(localStorage.getItem('user') || 'null');
        if (!user || user.role !== 'admin') {
            window.location.href = '/login.html';
        }

        let allProducts = [];
        let uploadedImages = []; // Array of URL strings

        async function loadData() {
            const [productsRes, cats] = await Promise.all([
                api.products.getAll({ limit: 100 }), // simple admin view without pagination for now
                api.categories.getAll()
            ]);

            allProducts = productsRes.products;
            const tbody = document.getElementById('productsTableBody');
            tbody.innerHTML = '';
            
            allProducts.forEach(p => {
                const prices = `
                    <div style="font-size: 0.85rem;">
                        <span style="color: green;">N: ${p.price_new ? formatPrice(p.price_new) : '-'}</span><br>
                        <span style="color: orange;">R: ${p.price_refurbished ? formatPrice(p.price_refurbished) : '-'}</span><br>
                        <span style="color: gray;">U: ${p.price_used ? formatPrice(p.price_used) : '-'}</span>
                    </div>
                `;
                tbody.innerHTML += `
                    <tr>
                        <td>#${p.id}</td>
                        <td><div style="font-weight:600">${p.name}</div><div style="font-size:0.8rem;color:var(--text-muted)">${p.brand}</div></td>
                        <td>${p.category_name}</td>
                        <td>${prices}</td>
                        <td>
                            <div class="action-flex">
                                <button class="btn btn-outline" style="padding: 0.25rem 0.75rem; font-size:0.8rem" onclick="editProduct(${p.id})">Edit</button>
                                <button class="btn btn-outline" style="padding: 0.25rem 0.75rem; font-size:0.8rem; border-color: red; color: red;" onclick="deleteProduct(${p.id})">Delete</button>
                            </div>
                        </td>
                    </tr>
                `;
            });

            const catSelect = document.getElementById('pCategory');
            catSelect.innerHTML = cats.map(c => `<option value="${c.id}">${c.name}</option>`).join('');
            
            loadFeedback();
        }

        async function loadFeedback() {
            try {
                const ratings = await api.ratings.getAll();
                const container = document.getElementById('feedbackContainer');
                container.innerHTML = ratings.map(r => `
                    <div class="auth-container" style="margin-bottom: 1rem; max-width: 100%;">
                        <div style="display: flex; justify-content: space-between; align-items: flex-start;">
                            <div>
                                <strong style="color: var(--primary); font-size: 1.1rem;">${'★'.repeat(r.score)}${'☆'.repeat(5-r.score)}</strong>
                                <div style="margin-top: 0.5rem; font-size: 1rem;">"${r.comment}"</div>
                            </div>
                            <div style="text-align: right; font-size: 0.8rem; color: var(--text-muted);">
                                <div>${r.user_name}</div>
                                <div>${new Date(r.created_at).toLocaleDateString()}</div>
                            </div>
                        </div>
                    </div>
                `).join('');
                if(ratings.length === 0) container.innerHTML = '<p>No feedback received yet.</p>';
            } catch(e) { console.error(e); }
        }

        function switchAdminTab(tab) {
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            document.querySelector(`.nav-item[href="#${tab}"]`).classList.add('active');
            
            document.getElementById('productsPanel').style.display = tab === 'products' ? 'block' : 'none';
            document.getElementById('feedbackPanel').style.display = tab === 'feedback' ? 'block' : 'none';
        }

        // --- Specifications Manager Logic ---
        function addSpecRow(key = '', value = '') {
            const container = document.getElementById('specsContainer');
            const row = document.createElement('div');
            row.className = 'specs-editor';
            row.innerHTML = `
                <input type="text" class="form-control spec-key" placeholder="Key (e.g. RAM)" value="${key}">
                <input type="text" class="form-control spec-value" placeholder="Value (e.g. 16GB)" value="${value}">
                <button type="button" class="btn btn-outline" onclick="this.parentElement.remove()" style="color:red; border-color:red; padding: 0 0.5rem">×</button>
            `;
            container.appendChild(row);
        }

        function getSpecsFromUI() {
            const specs = {};
            document.querySelectorAll('.specs-editor').forEach(row => {
                const key = row.querySelector('.spec-key').value.trim();
                const value = row.querySelector('.spec-value').value.trim();
                if (key) specs[key] = value;
            });
            return specs;
        }

        function setSpecsInUI(specsObj) {
            const container = document.getElementById('specsContainer');
            container.innerHTML = '';
            if (!specsObj) return;
            Object.entries(specsObj).forEach(([key, val]) => {
                addSpecRow(key, val);
            });
        }

        function loadPresets() {
            const catSelect = document.getElementById('pCategory');
            const categoryName = catSelect.options[catSelect.selectedIndex]?.text.toLowerCase() || '';
            
            const presets = {
                'laptops': ['CPU', 'RAM', 'Storage', 'Screen', 'Battery'],
                'phones': ['Screen', 'Processor', 'Battery', 'Camera', 'Storage'],
                'accessories': ['Type', 'Connectivity', 'Compatibility'],
                'power banks': ['Capacity', 'Ports', 'Input']
            };

            const fields = presets[categoryName] || ['Feature', 'Detail'];
            fields.forEach(f => addSpecRow(f, ''));
        }
        // ------------------------------------

        // --- Variations Manager Logic ---
        function addVariationRow(key = '', value = '') {
            const container = document.getElementById('variationsContainer');
            const row = document.createElement('div');
            row.className = 'variations-editor';
            
            let valStr = '';
            if (Array.isArray(value)) valStr = value.join(', ');
            else valStr = value;

            row.innerHTML = `
                <input type="text" class="form-control var-key" placeholder="Key (e.g. Color)" value="${key}">
                <input type="text" class="form-control var-value" placeholder="Red, Blue, Green" value="${valStr}">
                <button type="button" class="btn btn-outline" onclick="this.parentElement.remove()" style="color:red; border-color:red; padding: 0 0.5rem">×</button>
            `;
            container.appendChild(row);
        }

        function getVariationsFromUI() {
            const vars = {};
            document.querySelectorAll('.variations-editor').forEach(row => {
                const key = row.querySelector('.var-key').value.trim();
                const valueStr = row.querySelector('.var-value').value.trim();
                if (key && valueStr) {
                    vars[key] = valueStr.split(',').map(s => s.trim()).filter(s => s);
                }
            });
            return vars;
        }

        function setVariationsInUI(varsObj) {
            const container = document.getElementById('variationsContainer');
            container.innerHTML = '';
            if (!varsObj) return;
            Object.entries(varsObj).forEach(([key, val]) => {
                addVariationRow(key, val);
            });
        }
        // ------------------------------------

        // --- Images Logic ---
        function renderImagePreview() {
            const grid = document.getElementById('imagePreviewGrid');
            grid.innerHTML = '';
            uploadedImages.forEach((url, index) => {
                grid.innerHTML += `
                    <div class="image-preview-item">
                        <img src="${url}">
                        <button type="button" class="remove-img" onclick="removeImage(${index})">×</button>
                    </div>
                `;
            });
        }

        function removeImage(index) {
            uploadedImages.splice(index, 1);
            renderImagePreview();
        }

        document.getElementById('pImageInput').addEventListener('change', async (e) => {
            const files = Array.from(e.target.files);
            if (files.length === 0) return;
            
            if (uploadedImages.length + files.length > 9) {
                alert('You can only upload up to 9 images per product.');
                return;
            }

            const btn = document.getElementById('saveBtn');
            btn.disabled = true;
            btn.textContent = 'Uploading image(s)...';

            try {
                for(let file of files) {
                    const res = await api.upload(file);
                    uploadedImages.push(res.url);
                }
                renderImagePreview();
            } catch (err) {
                alert('Image upload failed');
            } finally {
                btn.disabled = false;
                btn.textContent = 'Save Product';
                e.target.value = ''; // reset input
            }
        });
        // ------------------------------------

        document.getElementById('productForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const specsObj = getSpecsFromUI();
            const varsObj = getVariationsFromUI();

            const payload = {
                name: document.getElementById('pName').value,
                brand: document.getElementById('pBrand').value,
                category_id: document.getElementById('pCategory').value,
                price_new: parseFloat(document.getElementById('pPriceNew').value) || null,
                price_refurbished: parseFloat(document.getElementById('pPriceRefurbished').value) || null,
                price_used: parseFloat(document.getElementById('pPriceUsed').value) || null,
                description: document.getElementById('pDesc').value,
                specs: specsObj,
                variations: varsObj,
                images: uploadedImages
            };

            // Basic validation
            if (!payload.price_new && !payload.price_refurbished && !payload.price_used) {
                alert('At least one price condition must be set.');
                return;
            }

            const id = document.getElementById('productId').value;
            try {
                if (id) {
                    await api.products.update(id, payload);
                } else {
                    await api.products.create(payload);
                }
                closeModal();
                loadData();
            } catch (err) {
                alert(err.message);
            }
        });

        async function deleteProduct(id) {
            if(confirm('Are you sure you want to delete this product?')) {
                await api.products.delete(id);
                loadData();
            }
        }

        function editProduct(id) {
            const p = allProducts.find(x => x.id === id);
            if (!p) return;
            document.getElementById('modalTitle').textContent = 'Edit Product';
            document.getElementById('productId').value = p.id;
            document.getElementById('pName').value = p.name;
            document.getElementById('pBrand').value = p.brand;
            document.getElementById('pCategory').value = p.category_id;
            
            document.getElementById('pPriceNew').value = p.price_new || '';
            document.getElementById('pPriceRefurbished').value = p.price_refurbished || '';
            document.getElementById('pPriceUsed').value = p.price_used || '';
            
            document.getElementById('pDesc').value = p.description;
            
            setSpecsInUI(p.specs);
            setVariationsInUI(p.variations);
            
            uploadedImages = p.images ? [...p.images] : [];
            renderImagePreview();
            
            document.getElementById('productModal').classList.add('active');
        }

        function openModal() {
            document.getElementById('modalTitle').textContent = 'Add Product';
            document.getElementById('productForm').reset();
            document.getElementById('productId').value = '';
            document.getElementById('specsContainer').innerHTML = '';
            document.getElementById('variationsContainer').innerHTML = '';
            uploadedImages = [];
            renderImagePreview();
            document.getElementById('productModal').classList.add('active');
        }

        function closeModal() {
            document.getElementById('productModal').classList.remove('active');
        }

        function logout() {
            localStorage.removeItem('token');
            localStorage.removeItem('user');
            window.location.href = '/login.html';
        }

        document.addEventListener('DOMContentLoaded', loadData);
    </script>
</body>
</html>
